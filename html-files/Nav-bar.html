<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS Files/Nav-bar.css">
</head>
<body>
    <main>
        <header>
            <nav class="navbar">
                <a class="logo" href="/">MyLogo</a>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
                <button class="login-btn">Login</button>
            </nav>
        </header>

        <section class="hero-section">
            <div class="overlay"></div>
            <div class="hero-content">
                <h1 class="hero-title">Design. Code. Launch.</h1>
                <p class="hero-para">Nova helps teams design, collaborate, and launch products efficiently — all in one platform.</p>

                <div class="hero-action">
                    <a href="https://app.nova.com/signup" class="btn primary">Get Started
                        <span class="arrow-wrapper">
                            <svg class="icon arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <polyline points="19 12 12 19 5 12"/>
                            </svg>
                        </span>
                    </a>
                    <a href="https://nova.com/demo" class="btn watch">Watch Demo
                        <svg class="icon play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                            <polygon points="10 8 16 12 10 16 10 8"/>
                        </svg>
                    </a>
                </div>
            </div>
        </section>

        
    </main>
</body>
</html>
