<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Basics</title>
  <style>
  .container
{
  display: flex;
  gap: 10px;
}

.box
{
  background-color: lightblue;
  margin: 20px 40px;
  padding: 10px 30px;
  width: 150px;
  height: 100px;
  border: 2px solid black;
}
.inline-box
{
  width: 200px;
  height: 100px;
  display: inline-block;
}

  </style>
</head>
<body>

  <h1>CSS Basics Demo</h1>

  <div class="container">
  <div class="box">Box 1</div>
  <div class="box">Box 2</div>
  <div class="box">Box 3</div>
  </div>

  <span class="inline-box">Inline A</span>
  <span class="inline-box">Inline B</span>

</body>
</html>
