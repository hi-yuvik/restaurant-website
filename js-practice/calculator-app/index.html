<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
</head>

<body>
    <input type = "number" id = "first-number" placeholder = "Enter Number">

    <select id = "operator">
        <option value = "+">+</option>
        <option value = "-">-</option>
        <option value = "*">*</option>
        <option value ="/">/</option>
    </select>

    <input type = "number" id = "second-number" placeholder = "Enter Number">

    <button id = "calculate-btn">Calculate</button>
    <h2 id = "result">Result</h2>

    <script src = "script.js"></script>
</body>
</html>
